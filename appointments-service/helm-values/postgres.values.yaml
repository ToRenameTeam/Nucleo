image:
  repository: postgres
  tag: 16-alpine

service:
  type: ClusterIP
  port: 5432

persistence:
  enabled: true
  size: 8Gi

auth:
  username: appointments_user
  password: appointments_pass
  database: appointments

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 200m
    memory: 256Mi
