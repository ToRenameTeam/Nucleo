worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  upstream users_service {
    server host.docker.internal:3030;
  }

  upstream master_data_service {
    server host.docker.internal:3040;
  }

  upstream appointments_service {
    server host.docker.internal:8080;
  }

  upstream documents_service {
    server host.docker.internal:8090;
  }

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Use NGINX as the single CORS authority to avoid duplicated headers from upstream services.
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location = /health {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location ~ ^/api/(auth|users|delegations|notifications)(/|$) {
      proxy_pass http://users_service;
      proxy_buffering off;
    }

    location ~ ^/api/(service-catalog|facilities|medicines)(/|$) {
      proxy_pass http://master_data_service;
    }

    location ~ ^/api/(appointments|availabilities)(/|$) {
      proxy_pass http://appointments_service;
    }

    location ~ ^/api/documents(/|$) {
      proxy_pass http://documents_service;
    }

    location / {
      default_type application/json;
      return 404 '{"error":"not_found","message":"No route configured for this path"}';
    }
  }
}
