services:
  kafka:
    image: apache/kafka:${KAFKA_VERSION}
    hostname: kafka
    container_name: ${KAFKA_CONTAINER_NAME}
    ports:
      - '${KAFKA_PORT}:${KAFKA_PORT}'
      - '${KAFKA_EXTERNAL_PORT}:${KAFKA_EXTERNAL_PORT}'
    environment:
      - KAFKA_NODE_ID=${KAFKA_NODE_ID}
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=${KAFKA_NODE_ID}@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:${KAFKA_PORT},CONTROLLER://:9093,EXTERNAL://:${KAFKA_EXTERNAL_PORT}
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:${KAFKA_PORT},EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - CLUSTER_ID=${KAFKA_KRAFT_CLUSTER_ID}
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:${KAFKA_PORT} --list || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  kafka-init:
    image: apache/kafka:${KAFKA_VERSION}
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVER=kafka:${KAFKA_PORT}
    entrypoint: ['/bin/bash', '/scripts/create-topics.sh']
    volumes:
      - ./scripts:/scripts
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - '${KAFKA_UI_PORT}:8080'
    environment:
      - KAFKA_CLUSTERS_0_NAME=kafka-kraft-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:${KAFKA_PORT}
      - SERVER_SERVLET_CONTEXT_PATH=/
    depends_on:
      - kafka
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  kafka_data:
    driver: local
