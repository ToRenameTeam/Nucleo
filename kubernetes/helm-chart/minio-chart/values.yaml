nameOverride: ""
fullnameOverride: minio

replicaCount: 1

image:
  repository: minio/minio
  tag: RELEASE.2025-02-18T16-25-55Z
  pullPolicy: IfNotPresent

auth:
  rootUser: minioadmin
  rootPassword: minioadmin

service:
  type: ClusterIP
  port: 9000

persistence:
  accessMode: ReadWriteOnce
  size: 10Gi
  storageClass: ""

probes:
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 5

resources: {}

