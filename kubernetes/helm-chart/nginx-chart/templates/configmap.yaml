apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-chart.fullname" . }}-config
  labels:
    {{- include "nginx-chart.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      sendfile on;
      keepalive_timeout 65;

      upstream frontend_service {
        server {{ .Values.frontend.host }}:{{ .Values.frontend.port }};
      }

      upstream users_service {
        server {{ .Values.backends.users.host }}:{{ .Values.backends.users.port }};
      }

      upstream master_data_service {
        server {{ .Values.backends.masterData.host }}:{{ .Values.backends.masterData.port }};
      }

      upstream appointments_service {
        server {{ .Values.backends.appointments.host }}:{{ .Values.backends.appointments.port }};
      }

      upstream documents_service {
        server {{ .Values.backends.documents.host }}:{{ .Values.backends.documents.port }};
      }

      server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Use NGINX as the single CORS authority to avoid duplicated headers from upstream services.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;

        if ($request_method = OPTIONS) {
          return 204;
        }

        location = /health {
          access_log off;
          return 200 'ok';
          add_header Content-Type text/plain;
        }

        location ~ ^/api/(auth|users|delegations)(/|$) {
          proxy_pass http://users_service;
        }

        location ~ ^/api/(service-catalog|facilities|medicines)(/|$) {
          proxy_pass http://master_data_service;
        }

        location ~ ^/api/(appointments|availabilities)(/|$) {
          proxy_pass http://appointments_service;
        }

        location ~ ^/api/documents(/|$) {
          proxy_pass http://documents_service;
        }

        location / {
          proxy_pass http://frontend_service;
        }
      }
    }

