apiVersion: v1
kind: Service
metadata:
  name: {{ include "mongo-chart.fullname" . }}
  labels:
    {{- include "mongo-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: mongo
      port: {{ .Values.service.port }}
      targetPort: mongo
      protocol: TCP
  selector:
    {{- include "mongo-chart.selectorLabels" . | nindent 4 }}

